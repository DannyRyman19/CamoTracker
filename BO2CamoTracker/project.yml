name: BO2CamoTracker
options:
  bundleIdPrefix: com.DannyRyman
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "6.0"
  IPHONEOS_DEPLOYMENT_TARGET: "26.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  BO2CamoTracker:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
        type: group
      - path: Resources/BO2_Multiplayer_Camos.json
        buildPhase: resources
      - path: Resources/BO2_Multiplayer_Challenges.json
        buildPhase: resources
      - path: Resources/BO2_Reticles.json
        buildPhase: resources
      - path: Resources/AGENCYB.ttf
        buildPhase: resources
      - path: Resources/agency-fb-regular.ttf
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: BO2 Camo Tracker
        CFBundleDisplayName: BO2 Camo Tracker
        CFBundleIdentifier: com.DannyRyman.BO2CamoTracker
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIAppFonts:
          - AGENCYB.ttf
          - agency-fb-regular.ttf
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      SWIFT_VERSION: "6.0"
